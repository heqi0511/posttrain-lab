run_name: toy-math-posttraining-e2e
output_dir: runs/e2e/toy_math_posttraining
model_name_or_path: hf-internal-testing/tiny-random-gpt2
real_model_name_or_path: Qwen/Qwen3-0.6B
sft_seed_path: data/fixtures/e2e/sft_seed.jsonl
rlvr_seed_path: data/fixtures/e2e/rlvr_seed.jsonl
eval_prompt_path: data/fixtures/e2e/eval_math.jsonl
seed: 31
torch_dtype: auto
trust_remote_code: false
enable_thinking: false
limits:
  max_output_length: 128
  max_baseline_parse_failure_rate: 1.0
  max_parse_failure_rate: 0.0
  sft_train_examples: 80
  sft_val_examples: 10
  rlvr_train_examples: 80
  rlvr_gate_examples: 32
  max_rollout_gate_reward_mean: 0.95
  max_rollout_gate_perfect_reward_rate: 0.95
  sft_max_steps: 2
  real_sft_max_steps: 300
  real_sft_learning_rate: 0.0005
  rlvr_max_steps: 50
  rlvr_num_generations: 4
  rlvr_per_device_train_batch_size: 4
  eval_max_new_tokens: 32
