model_name_or_path: hf-internal-testing/tiny-random-gpt2
data_path: /tmp/posttrain_lab_sft/overfit32_sft.jsonl
output_dir: runs/sft/overfit32
dry_run: true
synthetic_data_if_missing: true
seed: 7
selection:
  split: train
  max_train_examples: 32
training:
  max_steps: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  max_seq_length: 128
peft:
  method: lora
  qlora: false
  r: 4
  lora_alpha: 8
  lora_dropout: 0.0
generation_check:
  max_new_tokens: 8
  prompts: [Compute 1 + 1., Compute 2 + 2.]
