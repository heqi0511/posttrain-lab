frontier:
  min_reward_mean: 0.2
  max_reward_mean: 0.8
  max_parse_failure_rate: 0.5
  min_unique_answer_count: 3
review:
  max_prompts: 20
peft:
  method: lora
  r: 4
  lora_alpha: 8
  lora_dropout: 0.0
  target_modules: []
