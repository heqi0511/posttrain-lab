run_name: sft-overfit32-qwen3-0.6b
model_name_or_path: Qwen/Qwen3-0.6B
data_path: runs/sft/qwen3_0_6b_overfit32/data/sft_overfit32.jsonl
output_dir: runs/sft/qwen3_0_6b_overfit32
dry_run: false
synthetic_data_if_missing: true
smoke_run: false
seed: 7
torch_dtype: bfloat16
trust_remote_code: false
attn_implementation: null
selection:
  train_split: train
  validation_split: val
  max_train_examples: 32
  max_validation_examples: 0
training:
  max_steps: 200
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.0005
  max_seq_length: 128
  bf16: true
  fp16: false
  gradient_checkpointing: true
  warmup_steps: 0
  save_total_limit: 2
peft:
  method: lora
  qlora: false
  r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
generation_check:
  max_new_tokens: 16
  prompts: [Compute 1 + 1., Compute 17 + 1., Compute 31 + 1.]
