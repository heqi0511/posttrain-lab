run_name: sft-qwen3-4b-sympy-boxed-full
model_name_or_path: Qwen/Qwen3-4B
data_path: data/staged/openr1_deepmath_sympy_boxed_v1/train.jsonl
validation_data_path: data/staged/openr1_deepmath_sympy_boxed_v1/val.jsonl
output_dir: runs/sft/qwen3_4b_sympy_boxed_full
dry_run: false
synthetic_data_if_missing: false
smoke_run: false
seed: 29
torch_dtype: bfloat16
trust_remote_code: false
attn_implementation: null
selection:
  train_split: train
  validation_split: val
  max_train_examples: 5000
  max_validation_examples: 500
training:
  max_steps: 1800
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 0.00002
  max_seq_length: 2048
  bf16: true
  fp16: false
  gradient_checkpointing: true
  warmup_steps: 50
  logging_steps: 20
  eval_steps: 100
  save_steps: 100
  save_total_limit: 20
peft:
  method: lora
  qlora: false
  r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
generation_check:
  max_new_tokens: 256
  enable_thinking: false
  random_sample_count: 20
  prompts: []
eval_after_train:
  enabled: true
  prompt_source: validation
  sample_size: 64
  prompt_path: runs/sft/qwen3_4b_sympy_boxed_full/eval_validation_prompts.jsonl
  output_dir: runs/sft/qwen3_4b_sympy_boxed_full/eval
  baseline_metrics_path: /tmp/posttrain_lab_eval/baseline_run/metrics.json
  dry_run: false
  model_name: Qwen/Qwen3-4B
  adapter_path: runs/sft/qwen3_4b_sympy_boxed_full
  torch_dtype: bfloat16
  trust_remote_code: false
  apply_chat_template: true
  enable_thinking: false
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 256
  exact_match: false
  boxed_math_match: true
  allow_symbolic_equivalence: true
  symbolic_equivalence_engine: sympy
  format_regex: null
